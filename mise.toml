[tools]
go = "1.24.3"
bun = "latest"

[tasks.dev]
description = "Start scanner + web dev server"
run = """
trap 'kill 0' EXIT
(cd scan && go build ./cmd/bridge/ && ./bridge serve 2>&1 | sed -u 's/^/\x1b[36m[scan]\x1b[0m /') &
(cd web && bun run dev 2>&1 | sed -u 's/^/\x1b[33m[web]\x1b[0m  /') &
wait
"""

[tasks."dev:tmux"]
description = "Start scanner + web in tmux session 'bridge'"
run = """
tmux kill-session -t bridge 2>/dev/null || true
tmux new-session -d -s bridge -n scan -c "{{cwd}}/scan"
tmux send-keys -t bridge:scan 'go build ./cmd/bridge/ && ./bridge serve' Enter
tmux new-window -t bridge -n web -c "{{cwd}}/web"
tmux send-keys -t bridge:web 'bun run dev' Enter
tmux select-window -t bridge:scan
tmux attach -t bridge
"""

[tasks.build]
description = "Build scanner + web"
run = """
cd scan && go build ./cmd/bridge/
cd web && bun run build
"""

[tasks.test]
description = "Run all tests"
run = """
cd scan && go test ./...
cd web && bun test
"""

[tasks.lint]
description = "Lint all"
run = """
cd scan && go vet ./...
cd web && bun run tsc --noEmit
"""
