<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge Colony Map</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d1117;
        color: #c9d1d9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }
      canvas#colony {
        display: block;
        width: 100%;
        height: 100%;
      }
      #ui-root {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      #ui-root > * {
        pointer-events: auto;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .bridge-markdown p { margin: 0 0 8px; }
      .bridge-markdown p:last-child { margin-bottom: 0; }
      .bridge-markdown pre { background: #161b22; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
      .bridge-markdown code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
      .bridge-markdown :not(pre) > code { background: #161b22; padding: 2px 6px; border-radius: 4px; }
      .bridge-markdown ul, .bridge-markdown ol { padding-left: 20px; margin: 4px 0; }
      .bridge-markdown a { color: #58a6ff; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <canvas id="colony"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
